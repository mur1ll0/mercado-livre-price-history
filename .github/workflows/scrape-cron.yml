name: Mercado Livre Price Scraper Job

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 3:00 AM UTC (12:00 AM BRT)
  workflow_dispatch:      # Allows manual triggers from GitHub Actions UI
  repository_dispatch:    # Allows API triggers from Vercel backend
    types: 
      - scrape-all
      - scrape-listing

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Puppeteer Chromium Browser Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg
          npx puppeteer browsers install chrome

      - name: Execute Scraper Engine
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.action }}" = "scrape-listing" ]; then
            LINK_ID="${{ github.event.client_payload.linkId }}"
            echo "Executing fast scrape for single Announcement ID: $LINK_ID"
            node src/cron-scraper.js "$LINK_ID"
          else
            echo "Executing full scrape cycle for all active announcements"
            node src/cron-scraper.js
          fi
        env:
          MONGO_URI: ${{ secrets.MONGO_URI || secrets.MONGODB_URI }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NODE_ENV: production
