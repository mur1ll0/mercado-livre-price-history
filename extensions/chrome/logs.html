<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Logs do Sistema - Price History Tracker</title>
  <style>
    :root {
      --bg-color: #0c081d;
      --terminal-bg: #05030f;
      --text-color: #f7fafc;
      --primary-color: #8b5cf6;
      --border-color: rgba(255,255,255,0.08);
      --terminal-green: #10b981;
      --terminal-yellow: #f59e0b;
      --terminal-red: #ef4444;
      --terminal-blue: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background-color 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
    }
    
    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: var(--terminal-red);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid var(--border-color);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    .console-container {
      flex: 1;
      background-color: var(--terminal-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
    }

    .log-line {
      margin-bottom: 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-info { color: var(--text-color); }
    .log-warn { color: var(--terminal-yellow); }
    .log-error { color: var(--terminal-red); }
    .log-system { color: var(--terminal-blue); }

    .empty-logs {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #718096;
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Console de Logs da Extensão</h1>
      <p style="font-size: 0.8rem; color: #a0aec0; margin-top: 4px;">Monitoramento de conexões, requisições HTTP e erros de scraping.</p>
    </div>
    <div class="btn-group">
      <button class="btn-primary" id="refreshBtn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.73-.73" />
        </svg>
        Atualizar
      </button>
      <button class="btn-secondary" id="exportBtn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        Exportar (.txt)
      </button>
      <button class="btn-danger" id="clearBtn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        Limpar Console
      </button>
    </div>
  </header>

  <div class="console-container" id="consoleBox">
    <div class="empty-logs">Nenhum log registrado ainda.</div>
  </div>

  <script src="logs.js"></script>
</body>
</html>
