<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Widget - Price History Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #0a0712;
      --card-bg: #110e24;
      --accent-color: #8b5cf6;
      --accent-gradient: linear-gradient(135deg, #7c3aed, #4f46e5);
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-green: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .widget-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chart-container {
      flex: 1;
      position: relative;
      width: 100%;
      min-height: 0; /* allows flex item to shrink properly */
    }

    .loading, .message-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      z-index: 10;
      padding: 20px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.05);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    h4 { font-size: 13px; color: var(--text-primary); margin-bottom: 4px; font-weight: 600; }
    p { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }

    .btn {
      background: var(--accent-gradient);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
      transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
      outline: none;
      text-decoration: none;
      margin-top: 8px;
    }
    .btn:hover {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.45);
    }
    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 4px rgba(124, 58, 237, 0.2);
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="widget-container">
    
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading">
      <div class="spinner"></div>
      <p>Carregando histórico de preços...</p>
    </div>

    <!-- Error/Notice Screen -->
    <div id="messageScreen" class="message-container hidden">
      <h4 id="messageTitle">Não Rastreando</h4>
      <p id="messageText">Você ainda não está rastreando este produto no sistema.</p>
      <button class="btn id-action-btn hidden" id="actionBtn">Rastrear Preço</button>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <canvas id="widgetChart"></canvas>
    </div>
    
  </div>

  <script src="price-widget.js"></script>
</body>
</html>
